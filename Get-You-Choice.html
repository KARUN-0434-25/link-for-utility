<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Get You Choice | Copy Selection</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">

<style>
html, body {
    height: 100%;
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
}

body {
    /* Less black, more "Smoky Orange & Charcoal" */
    background-color: #1a1514; 
    background-image: linear-gradient(rgba(0, 0, 0, 0.6) 1px, transparent 1px),linear-gradient(90deg, rgba(0, 0, 0, 0.6) 1px, transparent 1px),radial-gradient(circle at 10% 20%, rgba(167, 55, 40, 0.3), transparent 40%),radial-gradient(circle at 90% 80%, rgba(223, 100, 63, 0.25), transparent 40%),linear-gradient(135deg, #1f1c1b 0%, #3d1f1d 100%);
    background-size: 45px 45px, 45px 45px, 100% 100%, 100% 100%, 100% 100%;
    background-repeat: repeat, repeat, no-repeat, no-repeat, no-repeat;
    background-position: center;
    background-attachment: fixed;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

#toast {
    position: fixed;
    top: -60px;
    left: 50%;
    transform: translateX(-50%);
    background: #df643f; 
    color: #fff;
    padding: 10px 25px;
    border-radius: 50px;
    font-weight: bold;
    z-index: 10000;
    transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 5px 15px rgba(223, 100, 63, 0.3);
}
#toast.show { top: 20px; }

header { padding: 10px 0 30px 0; }

.back-btn {
    text-decoration: none;
    color: white;
    background: rgba(255, 255, 255, 0.1);
    padding: 10px 20px;
    border-radius: 50px;
    font-weight: bold;
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    transition: 0.3s;
}
.back-btn:hover { 
    background: rgba(223, 100, 63, 0.2); 
    border-color: #df643f;
}

#main-page { column-count: 5; column-gap: 20px; flex: 1; }

.palette-item {
    break-inside: avoid;
    margin-bottom: 20px;
    text-align: center;
    background: rgba(35, 30, 30, 0.6); 
    padding: 15px;
    border-radius: 25px;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
}

.gradient-preview {
    width: 100%;
    height: 150px;
    border-radius: 18px;
    display: block;
    margin-bottom: 15px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}

.color-tag {
    display: inline-block;
    background: rgba(255, 255, 255, 0.07);
    color: #eee;
    padding: 5px 10px;
    margin: 3px;
    border-radius: 8px;
    font-size: 11px;
    font-family: monospace;
    cursor: pointer;
    transition: 0.2s;
}

.color-tag:hover {
    background: #df643f;
    color: #fff;
    transform: scale(1.1);
}

.copy-all-btn {
    display: block;
    width: 100%;
    margin-top: 15px;
    padding: 8px;
    border-radius: 12px;
    border: 1px solid rgba(223, 100, 63, 0.5);
    background: transparent;
    color: #df643f;
    font-weight: bold;
    font-size: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.copy-all-btn:hover {
    background: #df643f;
    color: #fff;
}

#footer { text-align: center; color: rgba(255, 255, 255, 0.5); padding: 40px 0 20px; font-size: 0.9rem; }

#dev-badge {
    position: fixed; bottom: 20px; right: 20px;
    background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
    padding: 8px 15px; border-radius: 50px; font-size: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1); color: #ccc;
}
body {
  user-select: none;
  -webkit-user-select: none;
}
@media (max-width:1200px){ #main-page{column-count:4;} }
@media (max-width:768px){ #main-page{column-count:2;} }
@media (max-width:480px){ #main-page{column-count:1;} }
</style>
</head>
<body>

<div id="toast">Copied to clipboard!</div>

<header>
    <a href="index.html" class="back-btn">← Back to Home</a>
</header>

<div id="main-page"></div>

<footer id="footer">
    <p>Copyright ©️ 2026. CopyGrady | All Rights Reserved</p>
</footer>

<div id="dev-badge">Built by <b>Arunesh</b></div>

<script>
const toast = document.getElementById('toast');

function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function copyToClipboard(text, msg) {
    navigator.clipboard.writeText(text).then(() => {
        showToast(msg);
    });
}

const palettes = [
{colors:"#043f34,#71967d,#afcab8,#b6e5d2"},
{colors:"#F2F3F4,#DED1C6,#A77693,#174871,#0F2D4D"},
{colors:"#001D39,#0A4174,#49769F,#4E8EA2,#6EA2B3,#7BBDE8,#BDD8E9"},
{colors:"#092A39,#1D4F67,#50849F,#7EA7BE,#A5C3D2"},
{colors:"#154559,#2B6278,#062A3B,#68A4BC"},
{colors:"#3E2723,#4E342E,#6D4C41,#8D6E63,#A1887F,#BCAAA4,#D7CCC8"},
{colors:"#101916,#101511,#222922,#3D4633,#717476"},
{colors:"#561C24,#6D2932,#C7B7A3,#E8D8C4"},
{colors:"#0D4966,#206080,#327499,#4588B1,#5DA1CC"},
{colors:"#926447,#74492D,#562F25,#44221B,#341914"},
{colors:"#0D1D25,#104C64,#C6C6D0,#D59D80,#C0754D,#B6410F"},
{colors:"#2D4354,#73766A,#FED7A5,#9E6752,#534145,#20212B"},
{colors:"#0E1F2F,#27425D,#87A7D0,#E2CAD8,#C18DB4,#0E1B48"},
{colors:"#190019,#2B124C,#522B5B,#854F6C,#DFB6B2,#FBE4DB"},
{colors:"#1D1A39,#451952,#662549,#AE445A,#F38F5A,#E8BCB9"},
{colors:"#051F20,#0B2B26,#163832,#235347,#8EB69B,#DAF1DE"},
{colors:"#161E2F,#242F49,#384358,#FFA586,#B51A2B,#541A2E"},
{colors:"#3D1F1D,#A73728,#DF643F"},
{colors:"#293732,#949A9A,#6C826F,#90A68A,#C8D0C5"},
{colors:"#61683F,#757C53,#8B9269,#9FA67C,#B1B78F"},
{colors:"#D2F96F,#1F1F1F,#0E100A"},
{colors:"#221620,#44141A,#A32428,#FD8920,#4C8FC6,#272F46"},
{colors:"#003427,#246650,#829F82,#C6DBAC"},
{colors:"#0C1519,#162127,#3A3534,#724B39,#CF9D78"},
{colors:"#190019,#2B124C,#522B5B,#854F6C,#DFB6B2,#FBE4DB"},
{colors:"#222831,#283b48,#00a6c0,#D8d7cc"},
{colors:"#A7EBF2,#54ACBF,#26658C,#023859,#011C40"},
{colors:"#2C3E50,#B08D57"},
{colors:"#393939,#272727,#171717,#101010,#000000"},
{colors:"#0E1D21,#122E34,#677EBA,#ABAFB5,#EDB4B3"},
{colors:"#006BBB,#30A0E0,#FFC973,#30B155"},
{colors:"#000000,#df2531"},
{colors:"#362D25,#504736,#6A5E44,#8E7B59,#A59867"},
{colors:"#9D14FF,#C85BC6,#120917,#111111"}
];

const container = document.getElementById("main-page");

palettes.forEach(p => {
    const card = document.createElement("div");
    card.className = "palette-item";

    const gradientBox = document.createElement("div");
    gradientBox.className = "gradient-preview";
    gradientBox.style.background = `linear-gradient(135deg, ${p.colors})`;
    
    const tagsWrapper = document.createElement("div");
    const arr = p.colors.split(",");
    arr.forEach(c => {
        const cleanColor = c.trim();
        if(cleanColor === "") return;
        const span = document.createElement("span");
        span.className = "color-tag";
        span.textContent = cleanColor;
        span.onclick = () => copyToClipboard(cleanColor, `Copied: ${cleanColor}`);
        tagsWrapper.appendChild(span);
    });

    const allBtn = document.createElement("button");
    allBtn.className = "copy-all-btn";
    allBtn.textContent = "COPY ALL CODES";
    allBtn.onclick = () => copyToClipboard(p.colors, "All colors copied!");

    card.appendChild(gradientBox);
    card.appendChild(tagsWrapper);
    card.appendChild(allBtn);
    container.appendChild(card);
});


document.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("selectstart", e => e.preventDefault());
document.addEventListener("dragstart", e => e.preventDefault());

document.addEventListener("keydown", function(e) {
    if (
        e.key === "F12" ||
        (e.ctrlKey && ["u","s","c","x","a","i"].includes(e.key.toLowerCase())) ||
        (e.ctrlKey && e.shiftKey && ["i","j","c"].includes(e.key.toLowerCase()))
    ) {
        e.preventDefault();
    }
});
</script>

</body>
</html>
